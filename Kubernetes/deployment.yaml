apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubernetes-project
  template:
    metadata:
      labels:
        app: kubernetes-project
    spec:
      containers:
      - name: app
        image: shivavaddi/kubernetes-project:latest
        ports:
        - containerPort: 8080